services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: factory
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory
    ports:
      - "33705:5432"
    volumes:
      - factory-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory -d factory"]
      interval: 5s
      timeout: 3s
      retries: 20

  factory-api:
    build:
      context: ../..
      dockerfile: apps/factory-api/Dockerfile
    environment:
      PORT: 3001
      DATABASE_URL: postgres://factory:factory@db:5432/factory
    ports:
      - "33704:3001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  factory-db: {}
