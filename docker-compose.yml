name: factory-platform

services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "33700:80"
    volumes:
      - ./infra/nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - portal-ui
      - mobile-portal-ui
      - cockpit-ui
      - factory-api
      - cloudbeaver
      - rabbitmq
      - minio
      - tdengine
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "*"
      no_proxy: "*"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: factory
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory
    ports:
      - "33705:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory -d factory"]
      interval: 5s
      timeout: 3s
      retries: 20

  db-init-keycloak:
    image: postgres:16-alpine
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: factory
      PGPASSWORD: factory
    depends_on:
      db:
        condition: service_healthy
    entrypoint:
      [
        "sh",
        "-lc",
        "set -euo pipefail; psql -d postgres -tc \"SELECT 1 FROM pg_roles WHERE rolname='keycloak'\" | grep -q 1 || psql -d postgres -c \"CREATE ROLE keycloak LOGIN PASSWORD 'keycloak'\"; psql -d postgres -tc \"SELECT 1 FROM pg_database WHERE datname='keycloak'\" | grep -q 1 || psql -d postgres -c \"CREATE DATABASE keycloak OWNER keycloak\"",
      ]
    restart: "no"

  db-init-flowable:
    image: postgres:16-alpine
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: factory
      PGPASSWORD: factory
    depends_on:
      db:
        condition: service_healthy
    entrypoint:
      [
        "sh",
        "-lc",
        "set -euo pipefail; psql -d postgres -tc \"SELECT 1 FROM pg_roles WHERE rolname='flowable'\" | grep -q 1 || psql -d postgres -c \"CREATE ROLE flowable LOGIN PASSWORD 'flowable'\"; psql -d postgres -tc \"SELECT 1 FROM pg_database WHERE datname='flowable'\" | grep -q 1 || psql -d postgres -c \"CREATE DATABASE flowable OWNER flowable\"",
      ]
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.5
    command:
      [
        "start-dev",
        "--http-port=8080",
        "--import-realm",
        "--spi-theme-static-max-age=-1",
        "--spi-theme-cache-themes=false",
        "--spi-theme-cache-templates=false",
      ]
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: db
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${KC_HOSTNAME:-sso.corp.aygjm.lan}
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: "xforwarded"
    ports:
      - "18080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./infra/compose/sso-dev/realm:/opt/keycloak/data/import:ro
      - ./infra/keycloak/themes:/opt/keycloak/themes:ro
    depends_on:
      db:
        condition: service_healthy
      db-init-keycloak:
        condition: service_completed_successfully
    restart: unless-stopped

  factory-api:
    build:
      context: .
      dockerfile: apps/factory-api/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    environment:
      PORT: 3001
      DATABASE_URL: postgres://factory:factory@db:5432/factory
      AUTH_ENABLED: "true"
      AUTH_ISSUER: "http://sso.corp.aygjm.lan:18080/realms/factory-platform"
    ports:
      - "33704:3001"
    extra_hosts:
      - "sso.corp.aygjm.lan:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "33707:6379"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-factory}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-factory}
    ports:
      - "33708:5672"
      - "33709:15672"
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-http://minio:9000}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-http://localhost:33700/tools/minio/}
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      NO_PROXY: "localhost,127.0.0.1,minio"
      http_proxy: ""
      https_proxy: ""
      no_proxy: "localhost,127.0.0.1,minio"
    ports:
      - "33710:9000"
      - "33711:9001"
    volumes:
      - ./data/minio:/data
    restart: unless-stopped

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    environment:
      CB_SERVER_NAME: ${CB_SERVER_NAME:-Factory CloudBeaver}
      CB_SERVER_URL: ${CB_SERVER_URL:-http://localhost:33706/}
      CB_ADMIN_NAME: ${CB_ADMIN_NAME:-cbadmin}
      CB_ADMIN_PASSWORD: ${CB_ADMIN_PASSWORD:-cbadmin}
    ports:
      - "33706:8978"
    volumes:
      - ./data/cloudbeaver:/opt/cloudbeaver/workspace
    depends_on:
      - db
    restart: unless-stopped

  tdengine:
    build:
      context: .
      dockerfile: infra/tdengine/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-http://host.docker.internal:7897}
        HTTPS_PROXY: ${HTTPS_PROXY:-http://host.docker.internal:7897}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,db,factory-api,portal-ui,mobile-portal-ui,cockpit-ui,gateway,rabbitmq,redis,minio,cloudbeaver,tdengine,host.docker.internal}
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-http://host.docker.internal:7897}
      HTTPS_PROXY: ${HTTPS_PROXY:-http://host.docker.internal:7897}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,db,factory-api,portal-ui,mobile-portal-ui,cockpit-ui,gateway,rabbitmq,redis,minio,cloudbeaver,tdengine,host.docker.internal}
      http_proxy: ${HTTP_PROXY:-http://host.docker.internal:7897}
      https_proxy: ${HTTPS_PROXY:-http://host.docker.internal:7897}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,db,factory-api,portal-ui,mobile-portal-ui,cockpit-ui,gateway,rabbitmq,redis,minio,cloudbeaver,tdengine,host.docker.internal}
    ports:
      - "33712:6030"
      - "33712:6030/udp"
      - "33713:6041"
      - "33714:6060"
    volumes:
      - ./data/tdengine/data:/var/lib/taos
      - ./data/tdengine/log:/var/log/taos
    restart: unless-stopped

  portal-ui:
    build:
      context: .
      dockerfile: apps/portal-ui/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    ports:
      - "33701:80"
    restart: unless-stopped

  mobile-portal-ui:
    build:
      context: .
      dockerfile: apps/mobile-portal-ui/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    ports:
      - "33702:80"
    restart: unless-stopped

  cockpit-ui:
    build:
      context: .
      dockerfile: apps/cockpit-ui/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    ports:
      - "33703:80"
    restart: unless-stopped

  flowable-idm:
    image: flowable/flowable-idm:latest
    environment:
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/flowable
      SPRING_DATASOURCE_USERNAME: flowable
      SPRING_DATASOURCE_PASSWORD: flowable
    ports:
      - "33721:8080"
    depends_on:
      db:
        condition: service_healthy
      db-init-flowable:
        condition: service_completed_successfully
    restart: unless-stopped

  flowable-task:
    image: flowable/flowable-task:latest
    environment:
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/flowable
      SPRING_DATASOURCE_USERNAME: flowable
      SPRING_DATASOURCE_PASSWORD: flowable
      FLOWABLE_COMMON_APP_IDM_URL: http://flowable-idm:8080/flowable-idm
      FLOWABLE_COMMON_APP_IDM_REDIRECT_URL: http://localhost:33721/flowable-idm
      FLOWABLE_COMMON_APP_IDM_ADMIN_USER: admin
      FLOWABLE_COMMON_APP_IDM_ADMIN_PASSWORD: test
    ports:
      - "33722:8080"
    depends_on:
      db:
        condition: service_healthy
      db-init-flowable:
        condition: service_completed_successfully
      flowable-idm:
        condition: service_started
    restart: unless-stopped

  flowable-modeler:
    image: flowable/flowable-modeler:latest
    environment:
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/flowable
      SPRING_DATASOURCE_USERNAME: flowable
      SPRING_DATASOURCE_PASSWORD: flowable
      FLOWABLE_COMMON_APP_IDM_URL: http://flowable-idm:8080/flowable-idm
      FLOWABLE_COMMON_APP_IDM_REDIRECT_URL: http://localhost:33721/flowable-idm
      FLOWABLE_COMMON_APP_IDM_ADMIN_USER: admin
      FLOWABLE_COMMON_APP_IDM_ADMIN_PASSWORD: test
      FLOWABLE_MODELER_APP_DEPLOYMENT_API_URL: http://flowable-task:8080/flowable-task/process-api
    ports:
      - "33723:8080"
    depends_on:
      db:
        condition: service_healthy
      db-init-flowable:
        condition: service_completed_successfully
      flowable-idm:
        condition: service_started
      flowable-task:
        condition: service_started
    restart: unless-stopped

  flowable-admin:
    image: flowable/flowable-admin:latest
    environment:
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/flowable
      SPRING_DATASOURCE_USERNAME: flowable
      SPRING_DATASOURCE_PASSWORD: flowable
      FLOWABLE_COMMON_APP_IDM_URL: http://flowable-idm:8080/flowable-idm
      FLOWABLE_COMMON_APP_IDM_REDIRECT_URL: http://localhost:33721/flowable-idm
      FLOWABLE_COMMON_APP_IDM_ADMIN_USER: admin
      FLOWABLE_COMMON_APP_IDM_ADMIN_PASSWORD: test
      FLOWABLE_ADMIN_APP_SERVER_CONFIG_PROCESS_SERVER_ADDRESS: http://flowable-task
      FLOWABLE_ADMIN_APP_SERVER_CONFIG_PROCESS_PORT: 8080
      FLOWABLE_ADMIN_APP_SERVER_CONFIG_PROCESS_CONTEXT_ROOT: flowable-task
      FLOWABLE_ADMIN_APP_SERVER_CONFIG_PROCESS_REST_ROOT: process-api
    ports:
      - "33724:8080"
    depends_on:
      db:
        condition: service_healthy
      db-init-flowable:
        condition: service_completed_successfully
      flowable-idm:
        condition: service_started
      flowable-task:
        condition: service_started
    restart: unless-stopped

  flowable-rest:
    image: flowable/flowable-rest:latest
    environment:
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/flowable
      SPRING_DATASOURCE_USERNAME: flowable
      SPRING_DATASOURCE_PASSWORD: flowable
      FLOWABLE_REST_APP_ADMIN_USER_ID: rest-admin
      FLOWABLE_REST_APP_ADMIN_PASSWORD: test
      FLOWABLE_REST_APP_ADMIN_FIRST_NAME: Rest
      FLOWABLE_REST_APP_ADMIN_LAST_NAME: Admin
    ports:
      - "33725:8080"
    depends_on:
      db:
        condition: service_healthy
      db-init-flowable:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  keycloak_data:
