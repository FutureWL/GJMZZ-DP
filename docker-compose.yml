name: factory-platform

services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "33700:80"
    volumes:
      - ./infra/nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - portal-ui
      - mobile-portal-ui
      - cockpit-ui
      - factory-api
      - cloudbeaver
      - rabbitmq
      - minio
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: factory
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory
    ports:
      - "33705:5432"
    volumes:
      - factory-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory -d factory"]
      interval: 5s
      timeout: 3s
      retries: 20

  factory-api:
    build:
      context: .
      dockerfile: apps/factory-api/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    environment:
      PORT: 3001
      DATABASE_URL: postgres://factory:factory@db:5432/factory
    ports:
      - "33704:3001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "33707:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-factory}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-factory}
    ports:
      - "33708:5672"
      - "33709:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-http://localhost:33710}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-http://localhost:33700/tools/minio}
    ports:
      - "33710:9000"
      - "33711:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    ports:
      - "33706:8978"
    volumes:
      - cloudbeaver-data:/opt/cloudbeaver/workspace
    depends_on:
      - db
    restart: unless-stopped

  portal-ui:
    build:
      context: .
      dockerfile: apps/portal-ui/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    ports:
      - "33701:80"
    restart: unless-stopped

  mobile-portal-ui:
    build:
      context: .
      dockerfile: apps/mobile-portal-ui/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    ports:
      - "33702:80"
    restart: unless-stopped

  cockpit-ui:
    build:
      context: .
      dockerfile: apps/cockpit-ui/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    ports:
      - "33703:80"
    restart: unless-stopped

volumes:
  factory-db: {}
  redis-data: {}
  rabbitmq-data: {}
  minio-data: {}
  cloudbeaver-data: {}
