name: factory-pg-ha-dev

services:
  pg-0:
    image: bitnamilegacy/postgresql-repmgr:16.2.0-debian-11-r2
    environment:
      - POSTGRESQL_POSTGRES_PASSWORD=${POSTGRESQL_POSTGRES_PASSWORD}
      - POSTGRESQL_USERNAME=${POSTGRESQL_USERNAME}
      - POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD}
      - POSTGRESQL_DATABASE=${POSTGRESQL_DATABASE}
      - POSTGRESQL_SYNCHRONOUS_COMMIT_MODE=on
      - POSTGRESQL_NUM_SYNCHRONOUS_REPLICAS=1
      - POSTGRESQL_SYNCHRONOUS_REPLICAS_MODE=FIRST
      - REPMGR_PASSWORD=${REPMGR_PASSWORD}
      - REPMGR_PRIMARY_HOST=pg-0
      - REPMGR_PRIMARY_PORT=5432
      - REPMGR_PARTNER_NODES=pg-0,pg-1,pg-2
      - REPMGR_NODE_NAME=pg-0
      - REPMGR_NODE_NETWORK_NAME=pg-0
      - REPMGR_NODE_TYPE=data
      - REPMGR_PORT_NUMBER=5432
      - REPMGR_USERNAME=repmgr
    volumes:
      - pg_0_data:/bitnami/postgresql
      - ./initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - pgnet
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$$POSTGRESQL_POSTGRES_PASSWORD psql -U postgres -h 127.0.0.1 -p 5432 -d postgres -c 'select 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  pg-1:
    image: bitnamilegacy/postgresql-repmgr:16.2.0-debian-11-r2
    depends_on:
      pg-0:
        condition: service_healthy
    environment:
      - POSTGRESQL_POSTGRES_PASSWORD=${POSTGRESQL_POSTGRES_PASSWORD}
      - POSTGRESQL_USERNAME=${POSTGRESQL_USERNAME}
      - POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD}
      - POSTGRESQL_DATABASE=${POSTGRESQL_DATABASE}
      - POSTGRESQL_SYNCHRONOUS_COMMIT_MODE=on
      - POSTGRESQL_NUM_SYNCHRONOUS_REPLICAS=1
      - POSTGRESQL_SYNCHRONOUS_REPLICAS_MODE=FIRST
      - REPMGR_PASSWORD=${REPMGR_PASSWORD}
      - REPMGR_PRIMARY_HOST=pg-0
      - REPMGR_PRIMARY_PORT=5432
      - REPMGR_PARTNER_NODES=pg-0,pg-1,pg-2
      - REPMGR_NODE_NAME=pg-1
      - REPMGR_NODE_NETWORK_NAME=pg-1
      - REPMGR_NODE_TYPE=data
      - REPMGR_PORT_NUMBER=5432
      - REPMGR_USERNAME=repmgr
    volumes:
      - pg_1_data:/bitnami/postgresql
    networks:
      - pgnet
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$$POSTGRESQL_POSTGRES_PASSWORD psql -U postgres -h 127.0.0.1 -p 5432 -d postgres -c 'select 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  pg-2:
    image: bitnamilegacy/postgresql-repmgr:16.2.0-debian-11-r2
    depends_on:
      pg-0:
        condition: service_healthy
    environment:
      - POSTGRESQL_POSTGRES_PASSWORD=${POSTGRESQL_POSTGRES_PASSWORD}
      - POSTGRESQL_USERNAME=${POSTGRESQL_USERNAME}
      - POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD}
      - POSTGRESQL_DATABASE=${POSTGRESQL_DATABASE}
      - POSTGRESQL_SYNCHRONOUS_COMMIT_MODE=on
      - POSTGRESQL_NUM_SYNCHRONOUS_REPLICAS=1
      - POSTGRESQL_SYNCHRONOUS_REPLICAS_MODE=FIRST
      - REPMGR_PASSWORD=${REPMGR_PASSWORD}
      - REPMGR_PRIMARY_HOST=pg-0
      - REPMGR_PRIMARY_PORT=5432
      - REPMGR_PARTNER_NODES=pg-0,pg-1,pg-2
      - REPMGR_NODE_NAME=pg-2
      - REPMGR_NODE_NETWORK_NAME=pg-2
      - REPMGR_NODE_TYPE=data
      - REPMGR_PORT_NUMBER=5432
      - REPMGR_USERNAME=repmgr
    volumes:
      - pg_2_data:/bitnami/postgresql
    networks:
      - pgnet
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$$POSTGRESQL_POSTGRES_PASSWORD psql -U postgres -h 127.0.0.1 -p 5432 -d postgres -c 'select 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  pgpool:
    image: bitnamilegacy/pgpool:4.5.5-debian-12-r6
    depends_on:
      pg-0:
        condition: service_healthy
      pg-1:
        condition: service_healthy
      pg-2:
        condition: service_healthy
    ports:
      - "${PGPOOL_PORT}:5432"
    environment:
      - PGPOOL_BACKEND_NODES=0:pg-0:5432,1:pg-1:5432,2:pg-2:5432
      - PGPOOL_SR_CHECK_USER=repmgr
      - PGPOOL_SR_CHECK_PASSWORD=${REPMGR_PASSWORD}
      - PGPOOL_POSTGRES_USERNAME=postgres
      - PGPOOL_POSTGRES_PASSWORD=${POSTGRESQL_POSTGRES_PASSWORD}
      - PGPOOL_ADMIN_USERNAME=${PGPOOL_ADMIN_USERNAME}
      - PGPOOL_ADMIN_PASSWORD=${PGPOOL_ADMIN_PASSWORD}
      - PGPOOL_ENABLE_LOAD_BALANCING=no
      - PGPOOL_POSTGRES_CUSTOM_USERS=${POSTGRESQL_USERNAME}
      - PGPOOL_POSTGRES_CUSTOM_PASSWORDS=${POSTGRESQL_PASSWORD}
    networks:
      - pgnet
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$$PGPOOL_POSTGRES_PASSWORD psql -U $$PGPOOL_POSTGRES_USERNAME -h 127.0.0.1 -p 5432 -d postgres -c 'select 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  adminer:
    image: adminer:4
    depends_on:
      pgpool:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT}:8080"
    networks:
      - pgnet

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    depends_on:
      pgpool:
        condition: service_healthy
    ports:
      - "${CLOUDBEAVER_PORT}:8978"
    volumes:
      - cloudbeaver_workspace:/opt/cloudbeaver/workspace
    networks:
      - pgnet

volumes:
  pg_0_data:
  pg_1_data:
  pg_2_data:
  cloudbeaver_workspace:

networks:
  pgnet:
    driver: bridge
